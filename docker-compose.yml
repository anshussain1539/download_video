services:
  backend:
    build: ./backend
    container_name: video-downloader-backend
    restart: unless-stopped
    expose:
      - "8000"
    # Uncomment to expose backend directly during local dev/debug:
    # ports:
    #   - "8000:8000"

  frontend:
    build: ./frontend
    container_name: video-downloader-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-8080}:80"
